name: Build ARM32 Linux (The Final Strike)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter 3.41.2
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake pkg-config libwayland-dev libx11-dev libxkbcommon-dev libgles2-mesa-dev zip

      - name: Setup Sony Tool
        run: |
          git clone https://github.com/sony/flutter-elinux.git
          echo "$GITHUB_WORKSPACE/flutter-elinux/bin" >> $GITHUB_PATH

      - name: Build for ARM32
        run: |
          cd my_app
          
          # 1. Hijack the Sony tool internal SDK first
          rm -rf ../flutter-elinux/flutter
          ln -s $FLUTTER_ROOT ../flutter-elinux/flutter
          
          # 2. Run create (tool now uses the correct SDK)
          flutter-elinux create . || true
          
          # 3. Resolve dependencies with correct Dart
          flutter pub get
          
          # 4. Build ARM32 Linux GUI
          flutter-elinux build elinux --target-arch=arm32 --target-backend-type=x11 --release
