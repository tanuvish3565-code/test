name: Build ARM32 Linux

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake pkg-config libwayland-dev libx11-dev libxkbcommon-dev libgles2-mesa-dev zip curl

      - name: Setup Flutter 3.41.2
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true

      - name: Setup Sony Tool (Matched Version)
        run: |
          # We clone the tool and tell it NOT to download its own flutter
          git clone https://github.com/sony/flutter-elinux.git
          echo "$GITHUB_WORKSPACE/flutter-elinux/bin" >> $GITHUB_PATH

      - name: Build for ARM32
        env:
          # This variable tells the Sony tool to use the Flutter we already installed
          ELINUX_FLUTTER_SDK: ${{ env.FLUTTER_HOME }}
        run: |
          cd my_app
          # Verify we are on Dart 3.11
          dart --version
          
          # Force the tool to use our path for everything
          flutter-elinux create .
          flutter-elinux pub get
          flutter-elinux build elinux --target-arch=arm --target-backend-type=x11 --release
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm32-app
          path: my_app/build/elinux/arm/release/bundle/
