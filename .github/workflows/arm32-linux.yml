name: Build ARM32 Linux (Total Path Lockdown)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter 3.41.2
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake pkg-config libwayland-dev libx11-dev libxkbcommon-dev libgles2-mesa-dev zip

      - name: Setup Sony Tool
        run: |
          git clone https://github.com/sony/flutter-elinux.git
          echo "$GITHUB_WORKSPACE/flutter-elinux/bin" >> $GITHUB_PATH

      - name: Build for ARM32
        env:
          # We force these paths to ensure 3.11.0 is used everywhere
          FLUTTER_ROOT: ${{ env.FLUTTER_HOME }}
          DART_SDK: ${{ env.FLUTTER_HOME }}/bin/cache/dart-sdk
        run: |
          cd my_app
          
          # 1. Force the Sony tool to use our specific SDK folder
          # We point it to the actual path where flutter-action installs things
          export ELINUX_FLUTTER_SDK=$FLUTTER_ROOT
          
          # 2. Run pub get using the ABSOLUTE path to the 3.11.0 dart
          $FLUTTER_ROOT/bin/cache/dart-sdk/bin/dart pub get
          
          # 3. Create project (ignore errors as we will force-build)
          flutter-elinux create . || true
          
          # 4. Final Build - Using 'arm' and pointing to the correct SDK
          flutter-elinux build elinux --target-arch=arm --target-backend-type=x11 --release --flutter-sdk=$FLUTTER_ROOT
