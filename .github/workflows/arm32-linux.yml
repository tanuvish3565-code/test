name: Build ARM32 Linux (Final Success)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter 3.41.2
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake pkg-config libwayland-dev libx11-dev libxkbcommon-dev libgles2-mesa-dev zip

      - name: Setup Sony Tool
        run: |
          git clone https://github.com/sony/flutter-elinux.git
          echo "$GITHUB_WORKSPACE/flutter-elinux/bin" >> $GITHUB_PATH

      - name: Build for ARM32
        run: |
          cd my_app
          
          # 1. Manually find the Flutter path to prevent empty variable errors
          FLUTTER_PATH=$(which flutter | sed 's/\/bin\/flutter//')
          
          # 2. Hijack the Sony tool internal SDK
          rm -rf ../flutter-elinux/flutter
          ln -s $FLUTTER_PATH ../flutter-elinux/flutter
          
          # 3. Use the absolute path to Dart 3.11.0 for pub get
          $FLUTTER_PATH/bin/cache/dart-sdk/bin/dart pub get
          
          # 4. Create and Build using 'arm'
          flutter-elinux create . || true
          flutter-elinux build elinux --target-arch=arm --target-backend-type=x11 --release
