name: Build ARM32 Linux (Patched & Cached)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Setup Flutter with Caching (Saved Info: To reduce future build time)
      - name: Setup Flutter 3.41.2
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake pkg-config libwayland-dev libx11-dev libxkbcommon-dev libgles2-mesa-dev zip

      # 2. Clone and Patch Sony Tool
      - name: Setup & Patch Sony Tool
        run: |
          git clone https://github.com/sony/flutter-elinux.git
          # The ChatGPT Patch: Overwrite the internal pin to match our SDK
          echo "90673a4eef2" > ./flutter-elinux/tools/flutter_version
          echo "$GITHUB_WORKSPACE/flutter-elinux/bin" >> $GITHUB_PATH

      # 3. Build the App
      - name: Build for ARM32
        run: |
          cd my_app
          # Standard pub get using the cached SDK
          flutter pub get
          
          # This should now respect the patched version
          flutter-elinux create .
          flutter-elinux build elinux --target-arch=arm --target-backend-type=x11 --release

      # 4. Save the Result
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm32-app
          path: my_app/build/elinux/arm/release/bundle/
