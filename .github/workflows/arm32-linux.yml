name: Build ARM32 Linux (Patched & Cached)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter 3.41.2
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake pkg-config libwayland-dev libx11-dev libxkbcommon-dev libgles2-mesa-dev zip

      - name: Setup & Patch Sony Tool
        run: |
          git clone https://github.com/sony/flutter-elinux.git
          # Fix: Use the correct path for the version pin
          # We check for the file first, then overwrite it to prevent the downgrade
          if [ -f "./flutter-elinux/internal/flutter.version" ]; then
            echo "90673a4eef2" > ./flutter-elinux/internal/flutter.version
          else
            echo "90673a4eef2" > ./flutter-elinux/flutter.version
          fi
          echo "$GITHUB_WORKSPACE/flutter-elinux/bin" >> $GITHUB_PATH

      - name: Build for ARM32
        run: |
          cd my_app
          flutter pub get
          flutter-elinux create .
          flutter-elinux build elinux --target-arch=arm --target-backend-type=x11 --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm32-app
          path: my_app/build/elinux/arm/release/bundle/
