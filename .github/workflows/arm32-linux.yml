name: Build ARM32 Linux (The Final Strike)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter 3.41.2
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake pkg-config libwayland-dev libx11-dev libxkbcommon-dev libgles2-mesa-dev zip

      - name: Setup Sony Tool
        run: |
          git clone https://github.com/sony/flutter-elinux.git
          echo "$GITHUB_WORKSPACE/flutter-elinux/bin" >> $GITHUB_PATH

      - name: Build for ARM32
        run: |
          cd my_app
          
          # 1. Standard pub get with good Dart
          flutter pub get
          
          # 2. Run create (this will download the bad 3.7.2 SDK)
          flutter-elinux create . || true
          
          # 3. THE HIJACK: Delete the bad SDK the tool just downloaded 
          # and replace it with our good one from the runner
          rm -rf ../flutter-elinux/flutter
          ln -s $FLUTTER_ROOT ../flutter-elinux/flutter
          
          # 4. Now run the build. Since the folder is now a link to 3.41.2, 
          # it HAS to use Dart 3.11.
          flutter-elinux build elinux --target-arch=arm --target-backend-type=x11 --release
