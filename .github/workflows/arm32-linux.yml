name: Build ARM32 Linux

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake pkg-config libwayland-dev libx11-dev libxkbcommon-dev libgles2-mesa-dev zip curl

      - name: Setup Sony Tool and Freeze Version
        run: |
          git clone https://github.com/sony/flutter-elinux.git
          cd flutter-elinux
          
          # 1. Force initialize the internal flutter folder
          bin/flutter-elinux --version || true
          
          # 2. Go inside and force the correct version
          cd flutter
          git fetch --all --tags
          git checkout 90673a4eef2
          
          # 3. SABOTAGE: Delete the .git folder so 'git reset' commands fail silently
          rm -rf .git
          
          # 4. Add to path
          echo "$GITHUB_WORKSPACE/flutter-elinux/bin" >> $GITHUB_PATH

      - name: Build for ARM32
        run: |
          cd my_app
          # Now it can't revert because there is no .git folder to talk to
          flutter-elinux create .
          flutter-elinux pub get
          flutter-elinux build elinux --target-arch=arm --target-backend-type=x11 --release
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm32-app
          path: my_app/build/elinux/arm/release/bundle/
