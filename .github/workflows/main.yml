name: Windows x64 Build Only

on:
  workflow_dispatch: # Allows you to trigger this from your Android phone

jobs:
  build-windows-x64:
    # Using the latest 2026 runner for maximum speed
    runs-on: windows-2025-vs2026 
    
    defaults:
      run:
        working-directory: my_app
        
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          # Note: No '3.x.x', just use '3.x' or 'any' to get the 2026 version
          flutter-version: '3.x'

      - name: Get Dependencies
        run: flutter pub get

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows x64
        # We explicitly target x64 to avoid confusion with ARM64
        run: flutter build windows --release

      - name: Upload Windows x64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-app
          # 2026 Flutter path includes the 'x64' architecture folder
          path: my_app/build/windows/x64/runner/Release/
          # No compression makes it faster to download to your phone
          compression-level: 0