name: Windows x64 Release Build

# This ensures the build starts on every push to main, 
# but also gives you the "Run workflow" button on your phone.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    # Using the latest March 2026 Windows runner with VS 2026
    runs-on: windows-2025-vs2026
    
    defaults:
      run:
        working-directory: my_app # Tells GitHub your code is in the subfolder

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.x'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Enable Windows Support
        run: flutter config --enable-windows-desktop

      - name: Build x64 Executable
        # Building specifically for x64 to match your request
        run: flutter build windows --release

      - name: Upload Windows App
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-release
          # This is the 2026 path: note the 'x64' folder
          path: my_app/build/windows/x64/runner/Release/
          # OPTIMIZATION: compression-level 0 makes the upload 
          # and your phone's download much faster.
          compression-level: 0
          if-no-files-found: error