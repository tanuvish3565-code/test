name: Flutter Multi-Platform Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # --- 1. ANDROID BUILD ---
  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # Added: Required for Flutter in 2026

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x' # Fixed: Changed from 3.x.x to 3.x
          channel: 'stable'
          cache: true

      - run: flutter pub get
      - run: flutter build apk --split-per-abi

      - name: Upload Android APKs
        uses: actions/upload-artifact@v4 # Fixed: Updated to v4
        with:
          name: android-apks
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 5

  # --- 2. WEB BUILD ---
  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x' # Fixed: Changed from 3.x.x to 3.x
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter build web --release
      - name: Upload Web build
        uses: actions/upload-artifact@v4 # Fixed: Updated to v4
        with:
          name: web-build
          path: build/web/
          retention-days: 5

  # --- 3. WINDOWS BUILD ---
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x' # Fixed: Changed from 3.x.x to 3.x
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter config --enable-windows-desktop
      - run: flutter build windows --release
      
      - name: Upload Windows build
        uses: actions/upload-artifact@v4 # Fixed: Updated to v4
        with:
          name: windows-build
          path: build/windows/runner/Release/
          retention-days: 5