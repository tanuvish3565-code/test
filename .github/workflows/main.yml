name: Flutter Multi-Platform Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  android-build:
    runs-on: ubuntu-latest
    # This block tells GitHub to run everything inside your 'my_app' folder
    defaults:
      run:
        working-directory: my_app
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - run: flutter pub get
      - run: flutter build apk --split-per-abi
      
      - name: Upload Android APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          # Updated path to include my_app
          path: my_app/build/app/outputs/flutter-apk/*.apk

  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: my_app
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build web --release
      - name: Upload Web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: my_app/build/web/

  windows-build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: my_app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - run: flutter pub get
      - run: flutter config --enable-windows-desktop
      - run: flutter build windows --release

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          # THE FIX: Added 'x64' to the path. 
          # Flutter 3.40+ puts files in my_app/build/windows/x64/runner/Release/
          path: my_app/build/windows/x64/runner/Release/
          if-no-files-found: error # This will make the job fail if the path is still wrong