name: Flutter Multi-Platform Build
# Run workflow when code is pushed to main, or 
# manually
on: push: branches: - main workflow_dispatch: jobs: 
  android-build:
    runs-on: ubuntu-latest steps: - name: Checkout 
      code
        uses: actions/checkout@v3 - name: Setup 
      Flutter
        uses: subosito/flutter-action@v2 with: 
          flutter-version: 'stable'
      - name: Get dependencies run: flutter pub get 
      - name: Build Android APK (ARM32)
        run: flutter build apk --target-platform 
        android-arm
      - name: Upload Android APK uses: 
        actions/upload-artifact@v3 with:
          name: android-arm-apk path: 
          build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
  web-build: runs-on: ubuntu-latest steps: - name: 
      Checkout code
        uses: actions/checkout@v3 - name: Setup 
      Flutter
        uses: subosito/flutter-action@v2 with: 
          flutter-version: 'stable'
      - name: Get dependencies run: flutter pub get 
      - name: Build Web
        run: flutter build web --release - name: 
      Upload Web Build
        uses: actions/upload-artifact@v3 with: 
          name: web-build path: build/web/
  windows-build: runs-on: windows-latest steps: - 
      name: Checkout code
        uses: actions/checkout@v3 - name: Setup 
      Flutter
        uses: subosito/flutter-action@v2 with: 
          flutter-version: 'stable'
      - name: Get dependencies run: flutter pub get 
      - name: Enable Windows desktop
        run: flutter config 
        --enable-windows-desktop
      - name: Build Windows run: flutter build 
        windows --release
      - name: Upload Windows Build uses: 
        actions/upload-artifact@v3 with:
          name: windows-build
          path: build/windows/runner/Release/
